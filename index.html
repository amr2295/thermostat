<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#111827"/>
<title>Thermostat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111827;color:#f9fafb;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
  .ring{width:220px;height:220px;border-radius:50%;background:#1e2a3a;border:6px solid #334155;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:border-color .4s,box-shadow .4s}
  .ring.heating{border-color:#f97316;box-shadow:0 0 28px #f9731640}
  .ring.cooling{border-color:#38bdf8;box-shadow:0 0 28px #38bdf840}
  .current-temp{font-size:64px;font-weight:300;line-height:1}
  .current-temp .unit{font-size:22px;vertical-align:super;margin-left:2px}
  .hvac-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;margin-top:2px}
  .humidity{font-size:13px;color:#64748b;margin-top:2px}
  .status-badge{padding:5px 16px;border-radius:99px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;transition:all .3s}
  .status-badge.on{background:#7c2d12;color:#fed7aa}
  .status-badge.off{background:#1f2937;color:#6b7280}
  .quick-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;text-align:center}
  .quick-btns{display:flex;gap:16px;align-items:center}
  .qbtn{width:90px;height:90px;border-radius:50%;border:none;cursor:pointer;font-weight:700;font-size:20px;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s,opacity .15s;line-height:1.1;box-shadow:0 4px 14px rgba(0,0,0,.4);-webkit-tap-highlight-color:transparent}
  .qbtn:hover:not(:disabled){transform:scale(1.07)}
  .qbtn:active:not(:disabled){transform:scale(.97)}
  .qbtn:disabled{opacity:.4;cursor:not-allowed}
  .qbtn .sub{font-size:11px;font-weight:400;opacity:.8}
  .qbtn.btn-65{background:linear-gradient(145deg,#818cf8,#4f46e5)}
  .qbtn.btn-68{background:linear-gradient(145deg,#0ea5e9,#0369a1)}
  .qbtn.btn-72{background:linear-gradient(145deg,#f97316,#c2410c)}
  .status-bar{height:20px;font-size:13px;color:#94a3b8;text-align:center}
  .status-bar.success{color:#4ade80}
  .status-bar.error{color:#f87171}
  .status-bar.info{color:#60a5fa}
  .conn{display:flex;align-items:center;gap:6px}
  .conn-dot{width:8px;height:8px;border-radius:50%}
  .conn-dot.good{background:#4ade80}
  .conn-dot.bad{background:#f87171}
  .conn-label{font-size:11px;color:#4b5563}
  #pin-screen{display:flex;flex-direction:column;align-items:center;gap:16px}
  #pin-screen h2{font-size:18px;color:#cbd5e1;font-weight:400}
  #pin-input{background:#1e2a3a;border:1px solid #334155;color:#f9fafb;padding:10px 16px;border-radius:10px;font-size:18px;text-align:center;letter-spacing:.3em;width:160px;outline:none}
  #pin-input:focus{border-color:#0ea5e9}
  #pin-submit{padding:10px 28px;background:#0ea5e9;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #pin-submit:disabled{opacity:.5;cursor:not-allowed}
  #pin-error{color:#f87171;font-size:13px;min-height:20px}
  #thermostat-screen{display:none;flex-direction:column;align-items:center;gap:22px}
  #thermostat-screen.active{display:flex}
  .min-note{font-size:11px;color:#374151;text-align:center}
</style>
</head>
<body>
<div id="pin-screen">
  <h2>Thermostat</h2>
  <p style="color:#64748b;font-size:13px">Enter PIN to continue</p>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="...."/>
  <button id="pin-submit" disabled>Enter</button>
  <div id="pin-error"></div>
</div>
<div id="thermostat-screen">
  <div class="ring" id="ring">
    <div class="current-temp" id="current-temp">--<span class="unit">F</span></div>
    <div class="hvac-label" id="hvac-label">--</div>
    <div class="humidity" id="humidity"></div>
  </div>
  <div class="status-badge off" id="status-badge">Heat is OFF</div>
  <div class="quick-label">Set Temperature</div>
  <div class="quick-btns">
    <button class="qbtn btn-65" id="btn65">65<span class="sub">F</span></button>
    <button class="qbtn btn-68" id="btn68">68<span class="sub">F</span></button>
    <button class="qbtn btn-72" id="btn72">72<span class="sub">F</span></button>
  </div>
  <div class="min-note">Range: 50F - 90F</div>
  <div class="status-bar" id="status-bar"></div>
  <div class="conn">
    <span class="conn-dot good" id="conn-dot"></span>
    <span class="conn-label" id="conn-label">Connected</span>
  </div>
</div>
<script>
(function(){
  var API="https://renter-thermostat.web.app";
  var pin="",currentStatus=null,pollTimer=null,failCount=0,statusTimer=null;
  var pinScreen=document.getElementById("pin-screen"),pinInput=document.getElementById("pin-input"),pinSubmit=document.getElementById("pin-submit"),pinError=document.getElementById("pin-error"),thermostatScreen=document.getElementById("thermostat-screen"),ring=document.getElementById("ring"),currentTempEl=document.getElementById("current-temp"),hvacLabel=document.getElementById("hvac-label"),humidityEl=document.getElementById("humidity"),statusBadge=document.getElementById("status-badge"),statusBar=document.getElementById("status-bar"),connDot=document.getElementById("conn-dot"),connLabel=document.getElementById("conn-label"),btn65=document.getElementById("btn65"),btn68=document.getElementById("btn68"),btn72=document.getElementById("btn72");
  function init(){pin=localStorage.getItem("thermostat_pin")||"";if(pin)authenticate();pinInput.addEventListener("input",function(){pinSubmit.disabled=pinInput.value.length<4;});pinInput.addEventListener("keydown",function(e){if(e.key==="Enter"&&pinInput.value.length>=4)submitPin();});pinSubmit.addEventListener("click",submitPin);btn65.addEventListener("click",function(){setTemp(65);});btn68.addEventListener("click",function(){setTemp(68);});btn72.addEventListener("click",function(){setTemp(72);});}
  function submitPin(){pin=pinInput.value.trim();authenticate();}
  function authenticate(){pinSubmit.disabled=true;pinError.textContent="";apiFetch("/api/status").then(function(resp){if(resp.ok){localStorage.setItem("thermostat_pin",pin);resp.json().then(function(data){showThermostat(data);startPolling();});}else if(resp.status===401){localStorage.removeItem("thermostat_pin");pin="";showPinError("Invalid PIN. Please try again.");pinSubmit.disabled=false;}else{showPinError("Connection error. Try again later.");pinSubmit.disabled=false;}}).catch(function(){showPinError("Cannot connect. Check internet.");pinSubmit.disabled=false;});}
  function showPinError(msg){pinError.textContent=msg;pinScreen.style.display="";thermostatScreen.classList.remove("active");}
  function showThermostat(data){currentStatus=data;pinScreen.style.display="none";thermostatScreen.classList.add("active");currentTempEl.innerHTML=data.currentTempF!=null?data.currentTempF+'<span class="unit">F</span>':'--<span class="unit">F</span>';humidityEl.textContent=data.humidity!=null?data.humidity+"% humidity":"";ring.className="ring";if(data.hvacStatus==="HEATING"){hvacLabel.textContent="Heating";ring.classList.add("heating");}else if(data.hvacStatus==="COOLING"){hvacLabel.textContent="Cooling";ring.classList.add("cooling");}else{hvacLabel.textContent="Idle";}var h=data.hvacStatus==="HEATING",c=data.hvacStatus==="COOLING";if(h){statusBadge.textContent="Heat is ON";statusBadge.className="status-badge on";}else if(c){statusBadge.textContent="Cool is ON";statusBadge.className="status-badge on";}else{statusBadge.textContent=data.mode==="COOL"?"Cool is OFF":"Heat is OFF";statusBadge.className="status-badge off";}var d=data.ecoMode;btn65.disabled=d;btn68.disabled=d;btn72.disabled=d;}
  function setTemp(temp){setAllButtons(true);showStatus("info","Setting to "+temp+"F...");apiFetch("/api/temperature",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({temperature:temp})}).then(function(resp){resp.json().then(function(data){if(resp.ok){showStatus("success","Set to "+temp+"F");setTimeout(refreshStatus,2000);}else{showStatus("error",data.error||"Failed to set temperature");}});}).catch(function(){showStatus("error","Connection error.");}).then(function(){setAllButtons(false);});}
  function setAllButtons(d){var e=currentStatus&&currentStatus.ecoMode;btn65.disabled=d||e;btn68.disabled=d||e;btn72.disabled=d||e;}
  function startPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(refreshStatus,10000);}
  function refreshStatus(){apiFetch("/api/status").then(function(resp){if(resp.ok){failCount=0;setConn(true);resp.json().then(showThermostat);}else if(resp.status===401){clearInterval(pollTimer);localStorage.removeItem("thermostat_pin");pin="";pinScreen.style.display="";thermostatScreen.classList.remove("active");showPinError("Session expired.");}else{handleFail();}}).catch(handleFail);}
  function handleFail(){failCount++;if(failCount>=2)setConn(false);}
  function setConn(ok){connDot.className="conn-dot "+(ok?"good":"bad");connLabel.textContent=ok?"Connected":"Reconnecting...";}
  function apiFetch(url,options){options=options||{};options.headers=options.headers||{};options.headers["x-pin"]=pin;return fetch(API+url,options);}
  function showStatus(type,msg){clearTimeout(statusTimer);statusBar.textContent=msg;statusBar.className="status-bar "+type;if(type==="success"||type==="info"){statusTimer=setTimeout(function(){statusBar.textContent="";statusBar.className="status-bar";},4000);}}
  init();
})();
</script>
</body>
</html>
