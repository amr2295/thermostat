<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thermostat">
<meta name="theme-color" content="#12172a">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2312172a'/%3E%3Ccircle cx='90' cy='82' r='48' fill='none' stroke='%231e2440' stroke-width='4'/%3E%3Cpath d='M90 34 A48 48 0 0 1 138 82' fill='none' stroke='%23e87c50' stroke-width='6' stroke-linecap='round'/%3E%3Ctext x='90' y='90' text-anchor='middle' font-family='-apple-system,sans-serif' font-size='28' font-weight='200' fill='white'%3E72%3C/text%3E%3Ctext x='90' y='108' text-anchor='middle' font-family='-apple-system,sans-serif' font-size='11' fill='%235a6280' letter-spacing='2'%3ETHERMOSTAT%3C/text%3E%3C/svg%3E">
<title>Thermostat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#12172a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;margin:0 auto;padding-top:16px}
#app{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px;padding-top:16px}
.app-header{display:flex;justify-content:space-between;align-items:center;width:100%;padding-bottom:16px}
.app-title{font-size:13px;letter-spacing:3px;color:#5a6280;text-transform:uppercase}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#3a4060;flex-shrink:0}
.conn-dot.online{background:#5aaa70;box-shadow:0 0 6px #5aaa70}
.conn-dot.error{background:#e87c50;box-shadow:0 0 6px #e87c50}
.nav-tabs{display:flex;width:100%;background:#161b2e;border-radius:16px;padding:4px;gap:2px;margin-bottom:20px}
.nav-tab{flex:1;padding:9px 4px;border-radius:12px;border:none;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;background:transparent;color:#404870}
.nav-tab.active{background:#1e2440;color:#c8d0e7}
.mode-tabs{display:flex;gap:8px;margin-bottom:20px}
.mode-tab{padding:8px 22px;border-radius:20px;border:none;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;background:#161b2e;color:#404870}
.mode-tab.heat.active{background:#5c2d1a;color:#e87c50}
.mode-tab.cool.active{background:#1a2d4c;color:#50a0e8}
.mode-tab.off.active{background:#2a2e3a;color:#9090a0}
.unit-toggle{display:flex;background:#161b2e;border-radius:20px;padding:3px;gap:2px;margin-bottom:20px}
.unit-btn{padding:6px 18px;border-radius:16px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#404870}
.unit-btn.active{background:#1e2440;color:#c8d0e7}
.thermostat-circle{position:relative;width:260px;height:260px;margin-bottom:20px}
.arc-container{position:absolute;inset:0}
.current-temp{font-size:72px;font-weight:200;line-height:1;color:#fff}
.current-temp .unit{font-size:22px;font-weight:300;position:absolute;top:10px;right:-26px;color:#8090b0}
.status-label{font-size:12px;letter-spacing:3px;color:#5a6a8a;text-transform:uppercase;margin-top:6px}
.humidity-label{font-size:12px;color:#3d5070;margin-top:4px}
.circle-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.status-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#161b2e;border-radius:12px;width:100%;margin-bottom:20px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3a4060;flex-shrink:0}
.status-dot.heating{background:#e87c50;box-shadow:0 0 8px #e87c50;animation:pulse 2s infinite}
.status-dot.cooling{background:#50a0e8;box-shadow:0 0 8px #50a0e8;animation:pulse 2s infinite}
.status-dot.idle{background:#5a8a70}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-text{font-size:12px;color:#5a6280;flex:1}
.schedule-badge{font-size:10px;background:#1e3a28;color:#5aaa70;padding:2px 8px;border-radius:10px;letter-spacing:1px}
.section{width:100%;margin-bottom:20px}
.section-label{font-size:11px;letter-spacing:3px;color:#404870;text-transform:uppercase;text-align:center;margin-bottom:14px}
.temp-control{display:flex;align-items:center;justify-content:center;gap:20px}
.ctrl-btn{width:60px;height:60px;border-radius:50%;border:none;background:#1a2040;color:#8090b0;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ctrl-btn:active{transform:scale(.92);background:#242850}
.set-temp-display{font-size:52px;font-weight:200;color:#c0c8e0;min-width:110px;text-align:center;position:relative}
.set-temp-display .unit{font-size:16px;color:#606888;position:absolute;top:8px;right:-16px}
.divider{width:100%;height:1px;background:#1e2438;margin:4px 0 20px}
.range-section{width:100%;background:#161b2e;border-radius:20px;padding:16px 20px;margin-bottom:20px}
.range-section .section-label{text-align:left;margin-bottom:8px}
.range-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0}
.range-row+.range-row{border-top:1px solid #1e2438}
.range-label{font-size:12px;letter-spacing:2px;text-transform:uppercase;width:70px}
.range-ctrl{display:flex;align-items:center;gap:14px}
.range-btn{width:36px;height:36px;border-radius:50%;border:none;background:#1e2440;color:#8090b0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.range-btn:active{transform:scale(.92)}
.range-temp{font-size:26px;font-weight:200;color:#c0c8e0;min-width:60px;text-align:center}
.schedule-card{width:100%;background:#161b2e;border-radius:20px;padding:16px;margin-bottom:16px}
.schedule-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.schedule-card-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#5a6280}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#1e2440;border-radius:12px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#404870;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:#1e3a28}
input:checked+.toggle-slider:before{transform:translateX(20px);background:#5aaa70}
.schedule-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:12px;color:#5a6280}
.schedule-row:not(:last-child){border-bottom:1px solid #1e2438}
.schedule-row-label{letter-spacing:1px;text-transform:uppercase;font-size:11px;width:60px}
.time-input{background:#1e2440;border:none;color:#c0c8e0;font-size:14px;padding:4px 8px;border-radius:8px;width:90px;text-align:center}
.schedule-temp-ctrl{display:flex;align-items:center;gap:8px}
.sched-btn{background:#1e2440;border:none;color:#8090b0;width:24px;height:24px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sched-temp{font-size:14px;color:#c0c8e0;min-width:54px;text-align:center}
.schedule-active-banner{background:#1e3a28;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.schedule-active-dot{width:8px;height:8px;border-radius:50%;background:#5aaa70;box-shadow:0 0 6px #5aaa70;animation:pulse 2s infinite;flex-shrink:0}
.schedule-active-text{font-size:12px;color:#5aaa70}
.schedule-inactive-banner{background:#161b2e;border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.schedule-inactive-dot{width:8px;height:8px;border-radius:50%;background:#3a4060;flex-shrink:0}
.schedule-inactive-text{font-size:12px;color:#404870}
.error-banner{background:#2a1a1a;border-radius:12px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#e87c50;text-align:center;display:none}
</style>
</head>
<body>
<div id="app">
  <div class="app-header"><div class="app-title">&#127777;&#65039; Thermostat</div><div class="conn-dot" id="conn-dot"></div></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="nav-home" onclick="showView('home')">Home</button>
    <button class="nav-tab" id="nav-schedule" onclick="showView('schedule')">Schedule</button>
  </div>
  <div id="error-banner" class="error-banner"></div>
  <div id="home-view" style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div class="mode-tabs">
      <button class="mode-tab heat" id="tab-heat" onclick="setMode('heat')">Heat</button>
      <button class="mode-tab cool" id="tab-cool" onclick="setMode('cool')">Cool</button>
      <button class="mode-tab off" id="tab-off" onclick="setMode('off')">Off</button>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-f" onclick="setUnit('F')">&deg;F</button>
      <button class="unit-btn" id="btn-c" onclick="setUnit('C')">&deg;C</button>
    </div>
    <div class="thermostat-circle" id="circle">
      <div class="arc-container"><svg viewBox="0 0 260 260"><circle cx="130" cy="130" r="122" fill="none" stroke="#1e2440" stroke-width="4" stroke-dasharray="766" stroke-dashoffset="0"/><circle cx="130" cy="130" r="122" fill="none" stroke="#e87c50" stroke-width="4" stroke-dasharray="766" stroke-dashoffset="766" stroke-linecap="round" id="arc" transform="rotate(-90 130 130)"/><circle cx="130" cy="130" r="116" fill="#161b2e"/><circle cx="130" cy="130" r="108" fill="#12172a"/></svg></div>
      <div class="circle-content">
        <div class="current-temp" style="position:relative"><span id="cur">--</span><span class="unit" id="cur-unit">&deg;F</span></div>
        <div class="status-label" id="hvac-status">LOADING</div>
        <div class="humidity-label" id="hum-label"></div>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot idle" id="status-dot"></div>
      <div class="status-text" id="status-text">Connecting...</div>
      <div class="schedule-badge" id="sched-badge" style="display:none">SCHEDULE ON</div>
    </div>
    <div class="section">
      <div class="section-label">Set Temperature</div>
      <div class="temp-control">
        <button class="ctrl-btn" onclick="adj(-1)">&#8722;</button>
        <div class="set-temp-display"><span id="stmp">--</span><span class="unit" id="stmp-unit">&deg;F</span></div>
        <button class="ctrl-btn" onclick="adj(1)">+</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="range-section">
      <div class="section-label">Set Temperature Range</div>
      <div class="range-row">
        <div class="range-label" style="color:#e87c50">HEAT TO</div>
        <div class="range-ctrl">
          <button class="range-btn" onclick="adjR('h',-1)">&#8722;</button>
          <div class="range-temp"><span id="hr">--</span></div>
          <button class="range-btn" onclick="adjR('h',1)">+</button>
        </div>
      </div>
      <div class="range-row">
        <div class="range-label" style="color:#50a0e8">COOL TO</div>
        <div class="range-ctrl">
          <button class="range-btn" onclick="adjR('c',-1)">&#8722;</button>
          <div class="range-temp"><span id="cr">--</span></div>
          <button class="range-btn" onclick="adjR('c',1)">+</button>
        </div>
      </div>
    </div>
  </div>
  <div id="schedule-view" style="display:none;width:100%">
    <div id="sched-active-banner" class="schedule-active-banner" style="display:none">
      <div class="schedule-active-dot"></div>
      <div class="schedule-active-text" id="sched-active-text">Schedule active</div>
    </div>
    <div id="sched-inactive-banner" class="schedule-inactive-banner">
      <div class="schedule-inactive-dot"></div>
      <div class="schedule-inactive-text">No schedule active right now</div>
    </div>
    <div class="schedule-card">
      <div class="schedule-card-header"><div class="schedule-card-title">&#9728;&#65039; Night Schedule</div><label class="toggle-switch"><input type="checkbox" id="night-toggle" onchange="saveSchedule()"><span class="toggle-slider"></span></label></div>
      <div class="schedule-row"><div class="schedule-row-label">From</div><input type="time" class="time-input" id="night-start" value="22:00" onchange="saveSchedule()"></div>
      <div class="schedule-row"><div class="schedule-row-label">To</div><input type="time" class="time-input" id="night-end" value="10:00" onchange="saveSchedule()"></div>
      <div class="schedule-row"><div class="schedule-row-label">Heat to</div><div class="schedule-temp-ctrl"><button class="sched-btn" onclick="adjSchedTemp('night',-1)">&#8722;</button><div class="sched-temp" id="night-temp">68&deg;F</div><button class="sched-btn" onclick="adjSchedTemp('night',1)">+</button></div></div>
    </div>
    <div class="schedule-card">
      <div class="schedule-card-header"><div class="schedule-card-title">&#9728;&#65039; Day Schedule</div><label class="toggle-switch"><input type="checkbox" id="day-toggle" onchange="saveSchedule()"><span class="toggle-slider"></span></label></div>
      <div class="schedule-row"><div class="schedule-row-label">From</div><input type="time" class="time-input" id="day-start" value="10:00" onchange="saveSchedule()"></div>
      <div class="schedule-row"><div class="schedule-row-label">To</div><input type="time" class="time-input" id="day-end" value="22:00" onchange="saveSchedule()"></div>
      <div class="schedule-row"><div class="schedule-row-label">Heat to</div><div class="schedule-temp-ctrl"><button class="sched-btn" onclick="adjSchedTemp('day',-1)">&#8722;</button><div class="sched-temp" id="day-temp">70&deg;F</div><button class="sched-btn" onclick="adjSchedTemp('day',1)">+</button></div></div>
    </div>
  </div>
</div>
<script>
const API='https://thermostat-81d90.web.app';
const PIN='4321';
const HDR={'x-pin':PIN};
let S={unit:'F',hr:null,cr:null};
let SC=JSON.parse(localStorage.getItem('sc5')||'null')||{nightOn:true,nightStart:'22:00',nightEnd:'10:00',nightTemp:68,dayOn:false,dayStart:'10:00',dayEnd:'22:00',dayTemp:70};
function saveSchedule(){SC.nightOn=document.getElementById('night-toggle').checked;SC.nightStart=document.getElementById('night-start').value;SC.nightEnd=document.getElementById('night-end').value;SC.dayOn=document.getElementById('day-toggle').checked;SC.dayStart=document.getElementById('day-start').value;SC.dayEnd=document.getElementById('day-end').value;localStorage.setItem('sc5',JSON.stringify(SC));checkSchedule()}
function loadScheduleUI(){document.getElementById('night-toggle').checked=SC.nightOn;document.getElementById('night-start').value=SC.nightStart;document.getElementById('night-end').value=SC.nightEnd;document.getElementById('day-toggle').checked=SC.dayOn;document.getElementById('day-start').value=SC.dayStart;document.getElementById('day-end').value=SC.dayEnd;document.getElementById('night-temp').textContent=SC.nightTemp+'°F';document.getElementById('day-temp').textContent=SC.dayTemp+'°F'}
function adjSchedTemp(w,d){if(w==='night'){SC.nightTemp=Math.max(50,Math.min(90,SC.nightTemp+d));document.getElementById('night-temp').textContent=SC.nightTemp+'°F'}else{SC.dayTemp=Math.max(50,Math.min(90,SC.dayTemp+d));document.getElementById('day-temp').textContent=SC.dayTemp+'°F'}saveSchedule()}
function timeToMins(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes()}
function inRange(s,e,now){const sm=timeToMins(s),em=timeToMins(e);return sm<=em?sm<=now&&now<em:now>=sm||now<em}
function showView(v){document.getElementById('home-view').style.display=v==='home'?'flex':'none';document.getElementById('schedule-view').style.display=v==='schedule'?'block':'none';document.getElementById('nav-home').classList.toggle('active',v==='home');document.getElementById('nav-schedule').classList.toggle('active',v==='schedule')}
function setUnit(u){S.unit=u;document.getElementById('btn-f').classList.toggle('active',u==='F');document.getElementById('btn-c').classList.toggle('active',u==='C');fetchStatus()}
function showError(msg){const b=document.getElementById('error-banner');if(msg){b.textContent=msg;b.style.display='block'}else{b.style.display='none'}}
function setConn(s){const d=document.getElementById('conn-dot');d.className='conn-dot'+(s==='online'?' online':s==='error'?' error':'')}
function fetchStatus(){
  fetch(API+'/api/status',{headers:HDR}).then(r=>r.json()).then(d=>{
    if(d.error)throw new Error(d.error);
    setConn('online');showError(null);
    const cur=S.unit==='F'?d.currentTempF:d.currentTempC;
    const tgt=S.unit==='F'?d.targetTempF:Math.round((d.targetTempF-32)*5/9);
    document.getElementById('cur').textContent=Math.round(cur);
    document.getElementById('stmp').textContent=tgt!=null?Math.round(tgt):'--';
    document.getElementById('cur-unit').textContent=S.unit==='F'?'°F':'°C';
    document.getElementById('stmp-unit').textContent=S.unit==='F'?'°F':'°C';
    const hv=d.hvacStatus||'';
    document.getElementById('hvac-status').textContent=hv||'IDLE';
    document.getElementById('hum-label').textContent=d.humidity?d.humidity+'% humidity':'';
    const dot=document.getElementById('status-dot');
    dot.className='status-dot '+(hv==='HEATING'?'heating':hv==='COOLING'?'cooling':'idle');
    document.getElementById('status-text').textContent=hv==='HEATING'?'Heating...':hv==='COOLING'?'Cooling...':'At target temperature';
    const mode=(d.mode||'').toLowerCase();
    ['heat','cool','off'].forEach(m=>document.getElementById('tab-'+m).classList.toggle('active',mode===m));
    if(d.allowedRange){if(S.hr==null)S.hr=d.allowedRange.min;if(S.cr==null)S.cr=d.allowedRange.max}
    if(S.hr!=null)document.getElementById('hr').textContent=S.hr+'°F';
    if(S.cr!=null)document.getElementById('cr').textContent=S.cr+'°F';
    const pct=d.targetTempF!=null&&d.allowedRange?Math.max(0,Math.min(1,(d.targetTempF-d.allowedRange.min)/(d.allowedRange.max-d.allowedRange.min))):0.5;
    const arc=document.getElementById('arc');
    arc.setAttribute('stroke',mode==='heat'?'#e87c50':mode==='cool'?'#50a0e8':'#5a6280');
    arc.setAttribute('stroke-dashoffset',766-(pct*766*0.75));
  }).catch(e=>{setConn('error');showError('Could not connect. '+e.message)});
}
function setTemp(t){
  fetch(API+'/api/temperature',{method:'POST',headers:{...HDR,'Content-Type':'application/json'},body:JSON.stringify({temperature:t})})
    .then(r=>r.json()).then(d=>{if(d.error)throw new Error(d.error);setTimeout(fetchStatus,500)})
    .catch(e=>showError('Failed to set temperature: '+e.message));
}
function setMode(m){
  fetch(API+'/api/mode',{method:'POST',headers:{...HDR,'Content-Type':'application/json'},body:JSON.stringify({mode:m.toUpperCase()})})
    .then(r=>r.json()).then(()=>setTimeout(fetchStatus,500))
    .catch(()=>['heat','cool','off'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===m)));
}
function adj(d){const cur=parseInt(document.getElementById('stmp').textContent)||70;setTemp(S.unit==='C'?Math.round((cur*9/5+32)+d):cur+d)}
function adjR(t,d){if(t==='h'){S.hr=Math.max(50,Math.min(90,(S.hr||65)+d));document.getElementById('hr').textContent=S.hr+'°F'}else{S.cr=Math.max(50,Math.min(90,(S.cr||75)+d));document.getElementById('cr').textContent=S.cr+'°F'}}
function checkSchedule(){
  const now=nowMins();
  let active=false,label='';
  if(SC.nightOn&&inRange(SC.nightStart,SC.nightEnd,now)){active=true;label='Night schedule: heating to '+SC.nightTemp+'°F'}
  else if(SC.dayOn&&inRange(SC.dayStart,SC.dayEnd,now)){active=true;label='Day schedule: heating to '+SC.dayTemp+'°F'}
  document.getElementById('sched-badge').style.display=active?'block':'none';
  document.getElementById('sched-active-banner').style.display=active?'flex':'none';
  document.getElementById('sched-inactive-banner').style.display=active?'none':'flex';
  if(active)document.getElementById('sched-active-text').textContent=label;
}
loadScheduleUI();fetchStatus();
setInterval(fetchStatus,30000);setInterval(checkSchedule,60000);checkSchedule();
</script>
</body>
</html>
